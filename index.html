<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Laundry POS</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Prevent pinch-to-zoom on iOS Safari (ignores user-scalable=no since iOS 10)
      document.addEventListener('gesturestart', function (e) { e.preventDefault() })
      document.addEventListener('gesturechange', function (e) { e.preventDefault() })
      document.addEventListener('gestureend', function (e) { e.preventDefault() })
      // Prevent pinch zoom via touch events (multi-finger)
      document.addEventListener('touchmove', function (e) {
        if (e.touches.length > 1) e.preventDefault()
      }, { passive: false })
      // Prevent trackpad pinch-to-zoom on desktop Chrome (ctrl+wheel)
      document.addEventListener('wheel', function (e) {
        if (e.ctrlKey) e.preventDefault()
      }, { passive: false })
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
